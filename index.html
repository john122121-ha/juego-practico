<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Saltar y Correr</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #87CEEB;
    }

    #game {
        position: relative;
        width: 100vw;
        height: 300px;
        border-bottom: 4px solid green;
        overflow: hidden;
    }

    #player {
        position: absolute;
        bottom: 0;
        left: 80px;
        width: 40px;
        height: 40px;
        background: red;
    }

    .jump {
        animation: jump 0.6s ease;
    }

    @keyframes jump {
        0% { bottom: 0; }
        50% { bottom: 120px; }
        100% { bottom: 0; }
    }

    #obstacle {
        position: absolute;
        bottom: 0;
        right: -30px;
        width: 30px;
        height: 50px;
        background: black;
        animation: moveObstacle 2s linear infinite;
    }

    @keyframes moveObstacle {
        from { right: -30px; }
        to { right: 100vw; }
    }

    #score {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 24px;
        font-family: Arial, sans-serif;
    }
</style>
</head>
<body>

<div id="game">
    <div id="score">Puntos: 0</div>
    <div id="player"></div>
    <div id="obstacle"></div>
</div>

<script>
const player = document.getElementById("player");
const obstacle = document.getElementById("obstacle");
const scoreText = document.getElementById("score");

let score = 0;
S
// Saltar
document.addEventListener("keydown", (e) => {
    if (e.code === "Space" && !player.classList.contains("jump")) {
        player.classList.add("jump");

        setTimeout(() => {
            player.classList.remove("jump");
        }, 600);
    }
});

// Puntos
setInterval(() => {
    score++;
    scoreText.textContent = "Puntos: " + score;
}, 1000);

// Colisiones
setInterval(() => {
    const playerBottom =
        parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));

    const obstacleLeft =
        obstacle.getBoundingClientRect().left;

    if (
        obstacleLeft > 60 &&
        obstacleLeft < 120 &&
        playerBottom < 50
    ) {
        alert("¡Game Over! Puntuación: " + score);
        location.reload();
    }
}, 20);
</script>

</body>
</html>
